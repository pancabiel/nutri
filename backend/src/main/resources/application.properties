# ---------- Auth ----------
app.password=${APP_PASSWORD:}

# ---------- HTTP ----------
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,content-type,x-auth

# ---------- Datasource (Supabase Postgres) ----------
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/postgres}
quarkus.datasource.username=${SUPABASE_DB_USER:postgres}
quarkus.datasource.password=${SUPABASE_DB_PASSWORD:postgres}
quarkus.datasource.jdbc.max-size=4
quarkus.datasource.jdbc.min-size=0
# Supabase pooler (PgBouncer in transaction mode) reuses backend sessions across
# clients, which collides with PG JDBC's server-side prepared-statement cache
# ("prepared statement S_1 already exists"). Disabling the cache fixes it.
quarkus.datasource.jdbc.additional-jdbc-properties.prepareThreshold=0

# ---------- Anthropic ----------
quarkus.rest-client.anthropic.url=https://api.anthropic.com
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=claude-sonnet-4-6
anthropic.max-tokens=2048

# ---------- Native / Lambda ----------
quarkus.native.resources.includes=prompts/*.txt
quarkus.lambda.handler=default

# ---------- Logging ----------
quarkus.log.level=INFO
quarkus.log.category."com.nutri".level=DEBUG
